name: Deploy Rust Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@a54c7afa936fefeb4456b2dd8068152669aa8203 # stable
        with:
          toolchain: stable

      - name: Build docs (wire)
        run: cargo doc -p supervictor-wire --features alloc --no-deps

      - name: Build docs (endpoint)
        run: cargo doc -p supervictor-endpoint --features sqlite --no-deps --target x86_64-unknown-linux-gnu

      - name: Build docs (cli)
        run: cargo doc -p supervictor-cli --no-deps --target x86_64-unknown-linux-gnu

      - name: Assemble doc output
        run: |
          cp -r target/riscv32imc-unknown-none-elf/doc/supervictor_wire \
            target/x86_64-unknown-linux-gnu/doc/ 2>/dev/null || true
          echo '<meta http-equiv="refresh" content="0;url=supervictor_endpoint/index.html">' \
            > target/x86_64-unknown-linux-gnu/doc/index.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: target/x86_64-unknown-linux-gnu/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
