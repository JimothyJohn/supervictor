name: Python CI

on:
  push:
    paths:
      - "supervictor-cloud/**"
      - ".github/workflows/python_ci.yml"
  pull_request:
    paths:
      - "supervictor-cloud/**"
      - ".github/workflows/python_ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: supervictor-cloud

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1: Unit tests — no infrastructure required
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

  # ---------------------------------------------------------------------------
  # Tier 2: Integration tests — requires Docker + SAM CLI
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (sam local)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build SAM artifacts
        run: sam build --use-container

      - name: Start sam local
        run: |
          sam local start-api --port 3000 --log-file /tmp/sam.log &
          echo $! > /tmp/sam.pid
          for i in $(seq 1 120); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/hello 2>/dev/null) || true
            [ "$status" != "000" ] && break
            sleep 1
          done

      - name: Run integration tests
        run: SAM_LOCAL_URL=http://localhost:3000 uv run pytest tests/integration/ -m local -v

      - name: Stop sam local
        if: always()
        run: kill $(cat /tmp/sam.pid) 2>/dev/null || true
