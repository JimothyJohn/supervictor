name: Python CI

on:
  push:
    paths:
      - "cloud/**"
      - "quickstart/**"
      - "ruff.toml"
      - ".github/workflows/python_ci.yml"
  pull_request:
    paths:
      - "cloud/**"
      - "quickstart/**"
      - "ruff.toml"
      - ".github/workflows/python_ci.yml"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1: Unit tests — no infrastructure required
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Run cloud unit tests
        run: uv run pytest cloud/tests/unit/ -v

      - name: Run quickstart tests
        run: uv run pytest quickstart/tests/ -v

  # ---------------------------------------------------------------------------
  # Tier 2: Integration tests — requires Docker + SAM CLI
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (sam local)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
        with:
          platforms: arm64

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2
        with:
          use-installer: true

      - name: Build SAM artifacts
        working-directory: cloud
        run: sam build --use-container

      - name: Start sam local
        working-directory: cloud
        run: |
          sam local start-api --port 3000 --log-file /tmp/sam.log &
          echo $! > /tmp/sam.pid
          for i in $(seq 1 120); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null) || true
            [ "$status" != "000" ] && break
            sleep 1
          done

      - name: Run integration tests
        run: SAM_LOCAL_URL=http://localhost:3000 uv run pytest cloud/tests/integration/ -m local -v

      - name: Stop sam local
        if: always()
        run: kill $(cat /tmp/sam.pid) 2>/dev/null || true
