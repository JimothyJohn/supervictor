name: Python CI

on:
  push:
    paths:
      - "supervictor-cloud/**"
      - ".github/workflows/python_ci.yml"
  pull_request:
    paths:
      - "supervictor-cloud/**"
      - ".github/workflows/python_ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: supervictor-cloud

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1: Unit tests — no infrastructure required
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run unit tests
        run: ./scripts/run_unit_tests.sh

  # ---------------------------------------------------------------------------
  # Tier 2: Integration tests — requires Docker + SAM CLI
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (sam local)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Run integration tests
        run: ./scripts/run_integration_tests.sh
