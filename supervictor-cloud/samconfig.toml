# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default]
[default.global.parameters]
region = "us-east-1"

[default.build.parameters]
cached = true
parallel = true
use_container = true

[default.validate.parameters]
lint = true

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[dev]
[dev.global.parameters]
stack_name = "supervictor-dev"

[dev.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "supervictor"
parameter_overrides = "Environment=\"dev\" StackName=\"supervictor-dev\" AppName=\"supervictor\""
stack_name = "supervictor"
region = "us-east-1"
image_repositories = []

[prod]
[prod.global.parameters]
stack_name = "supervictor-prod"

[prod.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "supervictor-prod"
parameter_overrides = "Environment=prod StackName=supervictor-prod AppName=supervictor"
