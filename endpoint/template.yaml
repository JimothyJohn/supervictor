AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
    supervictor-endpoint
    Rust API endpoint for Supervictor edge device with mTLS authentication.

Parameters:
    Environment:
        Type: String
        Default: dev
        AllowedValues:
            - dev
            - prod

    StackName:
        Type: String
        Default: supervictor-endpoint-dev
        Description: The name of the CloudFormation stack.

    AppName:
        Type: String
        Default: supervictor
        Description: The application name.

    TruststoreUri:
        Type: String
        Default: s3://supervictor/truststore.pem
        Description: S3 URI of the CA PEM file used as the mTLS truststore.

Conditions:
    IsProd: !Equals [!Ref Environment, prod]

Globals:
    Function:
        Timeout: 10
        MemorySize: 256
        Tracing: Active
        LoggingConfig:
            LogFormat: JSON
    Api:
        TracingEnabled: true

Resources:
    # -------------------------------------------------------------------------
    # API Gateway (Regional REST API)
    # -------------------------------------------------------------------------
    SupervictorApi:
        Type: AWS::Serverless::Api
        Properties:
            StageName: !Ref Environment
            EndpointConfiguration: REGIONAL
            Cors:
                AllowMethods: "'GET,POST,OPTIONS'"
                AllowHeaders: "'Content-Type'"
                AllowOrigin: "'*'"

    # -------------------------------------------------------------------------
    # Lambda Function (Rust binary via Lambda Web Adapter)
    # -------------------------------------------------------------------------
    EndpointFunction:
        Type: AWS::Serverless::Function
        Properties:
            PackageType: Image
            Architectures:
                - arm64
            MemorySize: 256
            Timeout: 10
            Environment:
                Variables:
                    ENVIRONMENT: !Ref Environment
                    APP_NAME: !Ref AppName
                    LOG_LEVEL: INFO
                    AWS_LWA_PORT: "8000"
                    AWS_LWA_READINESS_CHECK_PATH: "/health"
                    STORE_BACKEND: dynamo
                    DEVICES_TABLE: !Ref DevicesTable
                    MESSAGES_TABLE: !Ref UplinkTable
            Policies:
                - Statement:
                      - Effect: Allow
                        Action:
                            - logs:CreateLogGroup
                            - logs:CreateLogStream
                            - logs:PutLogEvents
                        Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
                - Statement:
                      - Effect: Allow
                        Action:
                            - dynamodb:PutItem
                            - dynamodb:GetItem
                            - dynamodb:Scan
                            - dynamodb:Query
                        Resource:
                            - !GetAtt DevicesTable.Arn
                            - !GetAtt UplinkTable.Arn
            Events:
                HealthGet:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /health
                        Method: get
                HelloGet:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /
                        Method: get
                HelloPost:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /
                        Method: post
                DevicesPost:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /devices
                        Method: post
                DevicesGet:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /devices
                        Method: get
                DeviceGet:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /devices/{device_id}
                        Method: get
                DeviceUplinksGet:
                    Type: Api
                    Properties:
                        RestApiId: !Ref SupervictorApi
                        Path: /devices/{device_id}/uplinks
                        Method: get
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: ./
            DockerTag: latest

    # -------------------------------------------------------------------------
    # DynamoDB Tables
    # -------------------------------------------------------------------------
    DevicesTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: !Sub "${AWS::StackName}-devices"
            BillingMode: PAY_PER_REQUEST
            AttributeDefinitions:
                - AttributeName: device_id
                  AttributeType: S
            KeySchema:
                - AttributeName: device_id
                  KeyType: HASH

    UplinkTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: !Sub "${AWS::StackName}-uplinks"
            BillingMode: PAY_PER_REQUEST
            AttributeDefinitions:
                - AttributeName: device_id
                  AttributeType: S
                - AttributeName: received_at
                  AttributeType: S
            KeySchema:
                - AttributeName: device_id
                  KeyType: HASH
                - AttributeName: received_at
                  KeyType: RANGE

    # -------------------------------------------------------------------------
    # ACM Certificate (prod only)
    # -------------------------------------------------------------------------
    ApiCertificate:
        Type: AWS::CertificateManager::Certificate
        Condition: IsProd
        Properties:
            DomainName: supervictor.advin.io
            ValidationMethod: DNS
            DomainValidationOptions:
                - DomainName: supervictor.advin.io
                  HostedZoneId: !Sub "{{resolve:ssm:/${AppName}/${StackName}/hosted_zone_id}}"

    # -------------------------------------------------------------------------
    # Custom Domain with mTLS (prod only)
    # -------------------------------------------------------------------------
    SupervictorDomainName:
        Type: AWS::ApiGateway::DomainName
        Condition: IsProd
        Properties:
            DomainName: supervictor.advin.io
            RegionalCertificateArn: !Ref ApiCertificate
            MutualTlsAuthentication:
                TruststoreUri: !Ref TruststoreUri
            SecurityPolicy: TLS_1_2
            EndpointConfiguration:
                Types:
                    - REGIONAL

    ApiBasePathMapping:
        Type: AWS::ApiGateway::BasePathMapping
        Condition: IsProd
        Properties:
            DomainName: !Ref SupervictorDomainName
            RestApiId: !Ref SupervictorApi
            Stage: !Ref Environment

    # -------------------------------------------------------------------------
    # Route53 (prod only)
    # -------------------------------------------------------------------------
    Route53RecordSet:
        Type: AWS::Route53::RecordSet
        Condition: IsProd
        Properties:
            HostedZoneId: !Sub "{{resolve:ssm:/${AppName}/${StackName}/hosted_zone_id}}"
            Name: supervictor.advin.io
            Type: A
            AliasTarget:
                HostedZoneId: !GetAtt SupervictorDomainName.RegionalHostedZoneId
                DNSName: !GetAtt SupervictorDomainName.RegionalDomainName

    # -------------------------------------------------------------------------
    # Observability
    # -------------------------------------------------------------------------
    ApplicationResourceGroup:
        Type: AWS::ResourceGroups::Group
        Properties:
            Name: !Sub "ApplicationInsights-SAM-${AWS::StackName}"
            ResourceQuery:
                Type: CLOUDFORMATION_STACK_1_0

    ApplicationInsightsMonitoring:
        Type: AWS::ApplicationInsights::Application
        Properties:
            ResourceGroupName: !Ref ApplicationResourceGroup
            AutoConfigurationEnabled: true

Outputs:
    SupervictorApiEndpoint:
        Description: API Gateway endpoint URL
        Value: !Sub "https://${SupervictorApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"

    EndpointFunctionArn:
        Description: Endpoint Lambda Function ARN
        Value: !GetAtt EndpointFunction.Arn

    EndpointFunctionIamRole:
        Description: Implicit IAM Role ARN for Endpoint function
        Value: !GetAtt EndpointFunctionRole.Arn

    CustomDomainUrl:
        Description: Custom domain endpoint (prod only)
        Condition: IsProd
        Value: "https://supervictor.advin.io/"
